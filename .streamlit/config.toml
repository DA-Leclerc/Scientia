[theme]
# Nord Paradigm — palette deep-space + accents or/sarcelle
primaryColor              = "#d4a853"   # gold (CTA primary)
backgroundColor           = "#0a0f1e"   # abyss
secondaryBackgroundColor  = "#112240"   # navy (cartes, sidebar)
textColor                 = "#eaf2f8"   # white
font                      = "sans serif"

[server]
headless = true
runOnSave = true
fileWatcherType = "auto"

[browser]
gatherUsageStats = false
